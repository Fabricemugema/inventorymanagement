# Server Configuration
server.port=${PORT:8080}

# H2 Database Configuration (Works perfectly with Spring Boot)
spring.datasource.url=jdbc:h2:file:./inventorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.airtel.inventory=WARN
logging.level.root=WARN

# Security Configuration
spring.security.user.name=RegNo1
spring.security.user.password=RegNo2
